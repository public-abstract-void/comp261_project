<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Market Prediction</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- settings Gear -->
  <button class="settings-btn" id="settingsBtn">⚙</button>

  <!-- settings Popup -->
  <div class="settings-popup hidden" id="settingsPopup">
    <h2>Update Data</h2>

    <div class="settings-row">
      <label for="updateSlider">Update Data:</label>
      <div class="percent-box" id="percentDisplay">50.0%</div>
      <input type="range" id="updateSlider" min="0" max="100" step="0.1" value="50">
    </div>

    <button class="update-btn" id="updateBtn">Update</button>
  </div>

  <div class="container">
    <header class="header">
      <div>
        <h1>Stock Predictions</h1>
        <div class="sub">Demo UI: shows stock name + confidence, plus the latest close price for quick scanning.</div>
      </div>
      <button class="predict-btn" id="refreshBtn">Refresh</button>
    </header>

    <div class="top-section">
      <section class="panel">
        <div class="panel-head">
          <h2>Top Picks</h2>
          <div class="hint">Name, ticker, confidence</div>
        </div>
        <div class="list" id="stock-box"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Latest Prices</h2>
          <div class="hint">Most recent close</div>
        </div>
        <div class="list" id="price-box"></div>
      </section>
    </div>

    <div class="buy-section">
      <label>Buy Stock:</label>
      <input class="input-large" type="text" value="STK">

      <label>#:</label>
      <input class="input-small" type="number" value="1">

      <label>Price:</label>
      <input class="input-price" type="text" value="">
    </div>

    <button class="buy-btn">Buy</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
